<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Parcial Lenguajes III</title>
</head>
<body>
    <main>
        <form id="formulario">
            <h2>Inscripción al Curso</h2>
            
            <label for="nombre">Nombre y Apellido:</label>
            <input type="text" id="nombre">
            <span id="error-nombre" class="error"></span>

            <label for="dni">DNI:</label>
            <input type="text" id="dni">
            <span id="error-dni" class="error"></span>

            <label for="fechaNac">Fecha de Nacimiento:</label>
            <input type="date" id="fechaNac">
            <span id="error-fecha" class="error"></span>

            <div id="mensajeExito"></div>

            <div class="botones">
                <button type="submit">Enviar</button>
                <button type="button" id="btn-preguntas">Preguntas</button>
            </div>
        </form>

        <div id="respuestas-preguntas"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
